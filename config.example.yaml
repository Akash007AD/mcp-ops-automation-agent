slack:
  # Channels the bot reads requests from.
  # Add new channels using: python -m src.utils.channel_manager create <name>
  # The bot will be auto-joined and the channel registered here automatically.
  intake_channels:
    - new-channel
  # Channel where the bot posts daily/weekly summaries.
  updates_channel: new-channel

tracker:
  # "sheets" or "notion"
  backend: "sheets"

email:
  from_address: "your@gmail.com"
  from_name: "Team Ops Agent"
  recipients:
    daily:
      - "your@gmail.com"
    weekly:
      - "your@gmail.com"
    alerts:
      - "your@gmail.com"
    external: []
  subject_templates:
    daily: "Daily Request Overview — {date}"
    weekly: "Weekly Digest — {week_range}"
    alert: "⚠️ Urgent Alert — {date}"
