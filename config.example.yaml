# Copy this file to config.yaml and fill in your own values.
# Non-secret settings only — credentials and tokens live in .env instead.

tracker:
  # "sheets" or "notion" — must match the credentials you filled in .env.
  backend: "sheets"

email:
  from_address: "onboarding@resend.dev"
  from_name: "Team Ops Agent"
  recipients:
    # Recipients are static and config-driven by design — the agent cannot
    # discover or add new recipients on its own (see 02_ARCHITECTURE.md).
    daily:
      - "manager@yourcompany.com"
    weekly:
      - "manager@yourcompany.com"
      - "hr@yourcompany.com"
  subject_templates:
    daily: "Daily Request Overview — {date}"
    weekly: "Weekly Digest — {week_range}"
